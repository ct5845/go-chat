<main class="contents">
  <header class="flex items-center gap-4 p-2 sticky top-0 z-10 bg-surface">
    <a href="/chat" class="btn btn-icon" aria-label="New Chat">
      <span aria-hidden="true" class="icon">close</span>
    </a>
    <h1 class="text-lg leading-none">History</h1>
  </header>
  <div class="grow flex flex-col px-4 pb-4">
    {{ if not .Rows }}
    <div
      class="grow flex flex-col items-center justify-center gap-4 text-center"
    >
      <div
        class="size-32 flex items-center justify-center rounded-full border-2 border-dashed border-primary"
        aria-hidden="true"
      >
        <span class="icon icon-opsz-48 text-on-primary-container">forum</span>
      </div>
      <h2>No converations yet</h2>
      <p class="text-on-surface-variant">
        Once you start chatting, your past conversations will live here.
      </p>
      <a href="/chat" class="btn-primary">
        <span aria-hidden="true" class="icon icon-opsz-20">add</span>
        <span>Start a conversation</span>
      </a>
    </div>
    {{ else }}
    <ul class="flex flex-col gap-2">
      {{ range .Rows }}
      <li class="bg-container rounded-2xl flex items-center">
        <a
          href="/chat/{{ .ID }}"
          class="grow flex items-center gap-4 p-4 hover:bg-surface-container-high active:bg-surface-container-highest"
        >
          <div class="flex flex-col">
            <span class="text-base font-bold max-w-[15ch] truncate"
              >{{ .Title }}</span
            >
            <span class="text-xs text-on-surface-variant shrink-0"
              >{{ .Updated }}</span
            >
          </div>
        </a>
        <button
          popovertarget="menu-{{ .ID }}"
          aria-label="Conversation actions"
          class="conversation-menu btn btn-icon mr-2"
        >
          <span aria-hidden="true" class="icon">more_vert</span>
        </button>
        <div
          popover="auto"
          id="menu-{{ .ID }}"
          style="position-area: bottom span-left"
          class="absolute whitespace-nowrap shadow m-0 inset-0 open:menu"
        >
          <button
            data-id="{{ .ID }}"
            command="show-modal"
            commandfor="confirm-delete"
            class="menu-item text-error"
          >
            <span aria-hidden="true" class="icon icon-opsz-20">delete</span>
            <span>Delete</span>
          </button>
        </div>
      </li>
      {{ end }}
    </ul>
    {{ end }}
  </div>
  <dialog
    id="confirm-delete"
    closedby="any"
    aria-modal="true"
    aria-label="Confirm delete"
    class="m-auto w-[min(90vw,24rem)] rounded-2xl bg-surface shadow p-4 backdrop:bg-scrim/50"
  >
    <p>Delete this conversation?</p>
    <form method="dialog" class="flex justify-end gap-2 mt-4">
      <button class="btn">Cancel</button>
      <button value="delete" class="btn text-error">Delete</button>
    </form>
  </dialog>
</main>
